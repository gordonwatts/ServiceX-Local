name: CI

on:
  push:
    branches-ignore:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test,xAOD]

      - name: Set up Docker (macOS)
        if: runner.os == 'macOS'
        uses: docker/setup-docker-action@v4

      - name: Switch Docker to Linux containers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Hosted windows-latest runners ship dockerd in Windows containers mode.
          # Try the Docker Desktop switch first; if it isn't installed, fall back
          # to re-registering dockerd. Linux containers on Windows ultimately
          # require WSL2 + Docker Desktop, so this step may still fail.
          $cli = 'C:\Program Files\Docker\Docker\DockerCli.exe'
          if (Test-Path $cli) {
            & $cli -SwitchLinuxEngine
          } else {
            Write-Host "DockerCli.exe not found; Docker Desktop is not installed on this runner."
            Write-Host "Linux containers are unlikely to work without Docker Desktop + WSL2."
          }
          docker version

      - name: Install Apptainer (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Run tests (Ubuntu)
        if: runner.os == 'Linux'
        run: pytest --docker --singularity

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: pytest --docker

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test,xAOD]

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Run tests with coverage
        run: |
          pytest --cov=. --docker --singularity

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: pytest-code-coverage
