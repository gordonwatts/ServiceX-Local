name: CI

on:
  push:
    branches-ignore:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test,xAOD]

      - name: Set up Docker (macOS)
        if: runner.os == 'macOS'
        uses: docker/setup-docker-action@v4

      - name: Install Docker Desktop (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install docker-desktop --no-progress -y --ignore-package-exit-codes

      - name: Start Docker Desktop and wait for daemon (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = 'C:\Program Files\Docker\Docker\Docker Desktop.exe'
          if (-not (Test-Path $exe)) {
            Write-Error "Docker Desktop install did not produce $exe"
            exit 1
          }
          Start-Process $exe -ArgumentList '--quit-after-install','--accept-license' -Verb runAs
          Start-Process $exe -Verb runAs

          # Poll until the daemon answers (Docker Desktop initialises WSL2 + Linux engine on first run).
          $deadline = (Get-Date).AddMinutes(10)
          while ((Get-Date) -lt $deadline) {
            docker version 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker daemon is up."
              break
            }
            Start-Sleep -Seconds 10
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Docker daemon did not become ready in time"
            exit 1
          }
          docker info

      - name: Install Apptainer (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Run tests (Ubuntu)
        if: runner.os == 'Linux'
        run: pytest --docker --singularity

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: pytest --docker

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test,xAOD]

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer

      - name: Run tests with coverage
        run: |
          pytest --cov=. --docker --singularity

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: pytest-code-coverage
